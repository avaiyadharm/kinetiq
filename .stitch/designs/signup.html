<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetiq - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary-fixed": "#89f5e7",
                      "on-secondary-fixed-variant": "#005049",
                      "primary": "#b4c5ff",
                      "surface-container": "#16202e",
                      "primary-container": "#2563eb",
                      "on-secondary": "#003732",
                      "surface-container-lowest": "#050f1c",
                      "surface-dim": "#091421",
                      "secondary-fixed-dim": "#6bd8cb",
                      "on-secondary-fixed": "#00201d",
                      "inverse-primary": "#0053db",
                      "on-primary-fixed-variant": "#003ea8",
                      "on-primary-container": "#eeefff",
                      "surface-container-low": "#121c2a",
                      "secondary": "#6bd8cb",
                      "on-primary": "#002a78",
                      "tertiary-container": "#996100",
                      "surface-tint": "#b4c5ff",
                      "on-error": "#690005",
                      "on-surface": "#d9e3f6",
                      "surface-variant": "#2b3544",
                      "surface-container-highest": "#2b3544",
                      "on-tertiary-fixed-variant": "#653e00",
                      "on-background": "#d9e3f6",
                      "on-secondary-container": "#00302b",
                      "outline-variant": "#434655",
                      "error": "#ffb4ab",
                      "tertiary-fixed": "#ffddb8",
                      "on-surface-variant": "#c3c6d7",
                      "tertiary-fixed-dim": "#ffb95f",
                      "primary-fixed": "#dbe1ff",
                      "surface": "#091421",
                      "on-tertiary-fixed": "#2a1700",
                      "secondary-container": "#29a195",
                      "on-tertiary-container": "#ffeedd",
                      "inverse-on-surface": "#27313f",
                      "on-tertiary": "#472a00",
                      "on-primary-fixed": "#00174b",
                      "surface-bright": "#303a48",
                      "tertiary": "#ffb95f",
                      "primary-fixed-dim": "#b4c5ff",
                      "surface-container-high": "#212b39",
                      "on-error-container": "#ffdad6",
                      "outline": "#8d90a0",
                      "inverse-surface": "#d9e3f6",
                      "error-container": "#93000a",
                      "background": "#091421"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "sidebar_width": "320px",
                      "lg": "40px",
                      "xl": "64px",
                      "sm": "16px",
                      "md": "24px",
                      "gutter": "24px",
                      "base": "4px",
                      "xs": "8px"
              },
              "fontFamily": {
                      "label-md": ["JetBrains Mono"],
                      "headline-md": ["Space Grotesk"],
                      "headline-lg": ["Space Grotesk"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-lg-mobile": ["Space Grotesk"],
                      "display-lg": ["Space Grotesk"]
              },
              "fontSize": {
                      "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: 100dvh;
      background-image: 
        linear-gradient(rgba(37, 99, 235, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow-primary {
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
    }
    .glow-primary:hover {
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.5);
    }
  </style>
</head>
<body class="bg-background text-on-surface flex flex-col antialiased">
<!-- Decorative Top Bar -->
<div class="w-full h-1 bg-primary-container shrink-0"></div>
<main class="flex-1 flex items-center justify-center p-md">
<div class="w-full max-w-md">
<!-- Branding & Header -->
<div class="mb-xl text-center">
<div class="inline-flex items-center gap-xs mb-md">
<span class="material-symbols-outlined text-primary-container" style="font-size: 40px;">science</span>
<span class="font-display-lg text-display-lg text-on-surface tracking-tighter">KINETIQ</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Precision engineering for your laboratory workflow.</p>
</div>
<!-- Form Container -->
<div class="bg-surface-container-low border border-surface-variant p-md rounded-lg shadow-2xl">
<form class="flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-xs font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-outline" id="fullName" placeholder="MARIE CURIE" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="email">Laboratory Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-xs font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-outline" id="email" placeholder="m.curie@kinetiq.lab" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="password">Security Key</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-xs font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-outline" id="password" placeholder="••••••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Role Segmented Control -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Access Role</label>
<div class="flex p-1 bg-surface-container-lowest border border-outline-variant rounded-lg">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio" value="student"/>
<div class="py-xs text-center rounded-md font-label-md text-label-md text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:shadow-inner transition-all duration-200">STUDENT</div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="teacher"/>
<div class="py-xs text-center rounded-md font-label-md text-label-md text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:shadow-inner transition-all duration-200">TEACHER</div>
</label>
</div>
</div>
<!-- Submit -->
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md uppercase py-sm rounded-lg glow-primary active:scale-[0.98] transition-all duration-200 mt-xs font-bold tracking-widest" type="submit">
                    Initialize Account
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm my-md">
<div class="flex-1 h-[1px] bg-outline-variant"></div>
<span class="font-label-md text-label-md text-outline">AUTH.METHOD</span>
<div class="flex-1 h-[1px] bg-outline-variant"></div>
</div>
<!-- SSO -->
<button class="w-full border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-highest text-on-surface font-label-md text-label-md uppercase py-sm rounded-lg flex items-center justify-center gap-sm transition-all duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Laboratory ID
            </button>
</div>
<!-- Footer Action -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Existing personnel? <a class="font-semibold text-primary-container hover:underline" href="#">Authenticate Here</a>
</p>
</div>
</div>
</main>
</body></html>
